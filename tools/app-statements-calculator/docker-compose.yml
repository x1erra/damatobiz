services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-look-thru-streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      TZ: America/Toronto
      APP_DATA_DIR: /app/data
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - app_data:/app/data

    # Future expansion:
    # Add more apps as separate services with different host ports, for example:
    #
    # another-app:
    #   build: ./another-app
    #   ports:
    #     - "8502:8501"
    #   restart: unless-stopped
    #
    # Then point a Cloudflare Tunnel public hostname such as
    # another.damato.biz to http://localhost:8502.

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: app-look-thru-cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - streamlit

    # This token-based tunnel is configured in Cloudflare Zero Trust.
    # Recommended public hostname target for this app:
    #   https://app.damato.biz -> http://localhost:8501
    #
    # For future services, keep this cloudflared container and add more
    # public hostnames in the Cloudflare dashboard pointing to other local ports.

volumes:
  app_data:
    # Stores draft inputs and saved account history across container rebuilds.
